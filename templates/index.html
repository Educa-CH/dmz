{% extends "base.html" %}

{% block index %}
    <h1>{% trans %}Export hochladen{% endtrans %}</h1>
    <form method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 1.5rem; max-width: 500px; font-family: 'EducaSans', sans-serif; font-size: 1.1rem;">
        <label for="file-upload" style="padding: 0.8rem 1.2rem; background-color: #e0e0e0; border: 2px solid #bbb; border-radius: 6px; cursor: pointer; width: fit-content;">
            {% trans %}Datei auswählen{% endtrans %}
        </label>
        <input id="file-upload" type="file" name="file" accept=".csv" required style="display: none;" onchange="document.getElementById('filename').innerText = this.files[0]?.name || 'Keine Datei ausgewählt';">
        
        <span id="filename" style="font-size: 1.05rem; color: #555;">{% trans %}Keine Datei ausgewählt{% endtrans %}</span>

        <button type="submit" style="padding: 0.8rem 1.5rem; font-size: 1.1rem; border-radius: 6px;">{% trans %}Hochladen{% endtrans %}</button>
    </form>
    <h2>{% trans %}Beispiel{% endtrans %}</h2>
    <div style="text-align: center; margin-top: 1rem;">
        <!-- Download button styled like Datei auswählen -->
        <a href="{{ url_for('download_sample') }}" 
           style="display: inline-block; padding: 0.8rem 1.2rem; background-color: #e0e0e0; border: 2px solid #bbb; border-radius: 6px; cursor: pointer; font-family: 'EducaSans', sans-serif; width: fit-content; text-decoration: none; color: inherit;">
            {% trans %}Beispieldatei herunterladen{% endtrans %}
        </a>
    </div>
{% endblock %}
